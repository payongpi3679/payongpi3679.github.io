<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-Bit Angry Flappy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #222;
            font-family: 'Press Start 2P', cursive;
            touch-action: manipulation;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background-color: #5c94fc;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            box-shadow: 0 0 0 10px #000;
            max-width: 100%;
            max-height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 4px 4px 0px #000;
        }
        .pixel-btn {
            pointer-events: auto;
            background: #e74c3c;
            border: 4px solid #fff;
            box-shadow: 6px 6px 0px #000;
            padding: 16px 32px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s;
            color: white;
            font-family: 'Press Start 2P', cursive;
        }
        .pixel-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0px #000;
        }
        #score-display {
            font-size: 40px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="score-display" class="mb-auto" style="display: none;">0</div>
        
        <div id="start-screen" class="flex flex-col items-center">
            <h1 class="text-2xl mb-12 text-center leading-relaxed">ANGY<br>FLAPPY</h1>
            <button class="pixel-btn" onclick="startGame()">START</button>
            <p class="mt-10 text-[10px] opacity-80">TAP OR SPACE</p>
        </div>

        <div id="game-over-screen" class="flex flex-col items-center" style="display: none;">
            <h2 class="text-xl mb-4">WASTED</h2>
            <div id="final-score" class="text-sm mb-10">SCORE: 0</div>
            <button class="pixel-btn" onclick="resetGame()">REPLAY</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreLabel = document.getElementById('final-score');

        // Assets
        const birdImg = new Image();
        birdImg.src = 'angy.png'; // Updated to the pixel art version

        // Game constants
        const GRAVITY = 0.28;
        const JUMP_STRENGTH = -5.2;
        const PIPE_SPEED = 2.8;
        const PIPE_SPAWN_RATE = 95;
        const PIPE_GAP = 160;
        const BIRD_X = 60;

        // Game state
        let bird = { x: BIRD_X, y: 0, velocity: 0, width: 44, height: 44, rotation: 0 };
        let pipes = [];
        let score = 0;
        let frameCount = 0;
        let gameRunning = false;
        let animationId;

        function resize() {
            const width = Math.min(window.innerWidth, 400);
            const height = Math.min(window.innerHeight, 640);
            canvas.width = width;
            canvas.height = height;
            bird.y = canvas.height / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        function jump() {
            if (!gameRunning) return;
            bird.velocity = JUMP_STRENGTH;
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, { passive: false });
        canvas.addEventListener('mousedown', jump);

        function createPipe() {
            const minH = 60;
            const maxH = canvas.height - PIPE_GAP - minH - 80;
            const topHeight = Math.floor(Math.random() * (maxH - minH + 1)) + minH;
            pipes.push({ x: canvas.width, topHeight, width: 75, passed: false });
        }

        function drawBackground() {
            // 8-bit Static Clouds
            ctx.fillStyle = "#fff";
            const clouds = [[40, 60], [220, 140], [300, 40]];
            clouds.forEach(c => {
                ctx.fillRect(c[0], c[1], 45, 18);
                ctx.fillRect(c[0] + 10, c[1] - 10, 25, 10);
            });

            // 8-bit Ground
            const groundHeight = 60;
            ctx.fillStyle = "#ded895"; // Sand
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
            
            ctx.fillStyle = "#9ece6a"; // Grass layer
            ctx.fillRect(0, canvas.height - groundHeight, canvas.width, 15);
            
            // Decorative ground line
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - groundHeight);
            ctx.lineTo(canvas.width, canvas.height - groundHeight);
            ctx.stroke();
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            // Dynamic rotation for more "life"
            bird.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 8, bird.velocity * 0.08));
            ctx.rotate(bird.rotation);
            
            // Draw angy.png
            ctx.drawImage(birdImg, -bird.width/2, -bird.height/2, bird.width, bird.height);
            
            ctx.restore();
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                const pipeGreen = "#73bf2e";
                const pipeHighlight = "rgba(255,255,255,0.4)";
                
                const drawSegment = (x, y, w, h, isCap = false) => {
                    ctx.fillStyle = pipeGreen;
                    ctx.fillRect(x, y, w, h);
                    ctx.strokeStyle = "#000";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(x, y, w, h);
                    
                    // 8-bit shiny highlights
                    ctx.fillStyle = pipeHighlight;
                    ctx.fillRect(x + 8, y, 6, h);
                };

                // Top Pipe
                drawSegment(pipe.x, 0, pipe.width, pipe.topHeight);
                // Top Cap
                drawSegment(pipe.x - 6, pipe.topHeight - 35, pipe.width + 12, 35);

                // Bottom Pipe
                const bottomY = pipe.topHeight + PIPE_GAP;
                const bottomHeight = canvas.height - bottomY - 60;
                drawSegment(pipe.x, bottomY, pipe.width, bottomHeight);
                // Bottom Cap
                drawSegment(pipe.x - 6, bottomY, pipe.width + 12, 35);
            });
        }

        function update() {
            if (!gameRunning) return;

            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Collision check with floor/ceiling
            if (bird.y + bird.height/2 > canvas.height - 60 || bird.y - bird.height/2 < 0) {
                endGame();
            }

            if (frameCount % PIPE_SPAWN_RATE === 0) createPipe();

            for (let i = pipes.length - 1; i >= 0; i--) {
                const p = pipes[i];
                p.x -= PIPE_SPEED;

                // Tighter hitbox for pixel art
                const bPadding = 10;
                const bLeft = bird.x - bird.width/2 + bPadding;
                const bRight = bird.x + bird.width/2 - bPadding;
                const bTop = bird.y - bird.height/2 + bPadding;
                const bBottom = bird.y + bird.height/2 - bPadding;

                if (bRight > p.x && bLeft < p.x + p.width) {
                    if (bTop < p.topHeight || bBottom > p.topHeight + PIPE_GAP) {
                        endGame();
                    }
                }

                if (!p.passed && bird.x > p.x + p.width) {
                    score++;
                    p.passed = true;
                    scoreDisplay.innerText = score;
                }

                if (p.x + p.width < -30) pipes.splice(i, 1);
            }
            frameCount++;
        }

        function draw() {
            ctx.fillStyle = "#5c94fc"; // Clear blue sky
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            drawPipes();
            drawBird();

            if (gameRunning) {
                update();
                animationId = requestAnimationFrame(draw);
            }
        }

        function startGame() {
            startScreen.style.display = 'none';
            scoreDisplay.style.display = 'block';
            gameRunning = true;
            draw();
        }

        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            gameOverScreen.style.display = 'flex';
            finalScoreLabel.innerText = `SCORE: ${score}`;
        }

        function resetGame() {
            bird = { x: BIRD_X, y: canvas.height / 2, velocity: 0, width: 44, height: 44, rotation: 0 };
            pipes = [];
            score = 0;
            frameCount = 0;
            scoreDisplay.innerText = '0';
            gameOverScreen.style.display = 'none';
            startGame();
        }

        // Initial setup
        birdImg.onload = () => { if (!gameRunning) draw(); };
    </script>
</body>
</html>
